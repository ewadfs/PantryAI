# Railway service definition — headless capture worker (P38 B).
# Create a new Railway service from this repo with root directory /worker;
# this file pins its build + deploy settings. The API service points at it
# via HEADLESS_WORKER_URL (use the private-network URL, e.g.
# http://capture-worker.railway.internal:8080).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
